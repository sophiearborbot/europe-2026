]]}, {"name": "Route 6 \u2013 \ud83c\udf36\ufe0f Spain & Morocco Loop", "color": "#ff7043", "cities": [{"name": "Paris", "country": "France", "nights": 0, "hotel": "", "cost": 0, "highlights": "Departure city \u2014 fly direct to M\u00e1laga (~2.5h).", "booking_url": "", "coords": [48.8566, 2.3522]}, {"name": "M\u00e1laga", "country": "Spain", "nights": 2, "hotel": "Room Mate Valeria", "cost": 190, "highlights": "Alcazaba Moorish fortress above the city. Picasso Museum (he was born here). Centro Hist\u00f3rico tapas bars \u2014 some of Spain's best. Beaches on city doorstep. Gibraltar day trip (1h bus) \u2014 The Rock, Barbary macaques, sea views to Africa. Base for Morocco ferry (Algeciras 2h away).", "booking_url": "https://www.booking.com/hotel/es/room-mate-valeria.html", "coords": [36.7213, -4.4213]}, {"name": "Tangier", "country": "Morocco", "nights": 1, "hotel": "El Minzah Hotel", "cost": 125, "highlights": "35-min ferry crossing the Strait of Gibraltar \u2014 Africa comes into view, genuinely thrilling for kids. Tangier Kasbah & medina. Caf\u00e9 Hafa cliffside Atlantic views (Rolling Stones haunt). Petit Socco market. Gateway to Morocco.", "booking_url": "https://www.booking.com/hotel/ma/el-minzah.html", "coords": [35.7673, -5.7998]}, {"name": "Chefchaouen", "country": "Morocco", "nights": 1, "hotel": "Lina Ryad & Spa", "cost": 210, "highlights": "The Blue City \u2014 every alley painted blue & white, impossibly photogenic. Ras el-Maa waterfall walk. Plaza Uta el-Hammam for mint tea. Sunset hike to Spanish mosque hilltop. 3h bus from Tangier \u2014 worth every minute. Kids love it.", "booking_url": "https://www.booking.com/hotel/ma/lina-ryad-spa.html", "coords": [35.1688, -5.2692]}, {"name": "Amsterdam", "country": "Netherlands", "nights": 0, "hotel": "The Hoxton Amsterdam", "cost": 0, "highlights": "Bus Chefchaouen\u2192Tangier (3h) + ferry\u2192Algeciras (35 min) + bus\u2192M\u00e1laga (2h) \u2192 fly M\u00e1laga\u2192Amsterdam direct (3h, Transavia/easyJet ~\u20ac80-100/person). One long travel day back, but all of it low-stress.", "booking_url": "https://www.booking.com/hotel/nl/the-hoxton-amsterdam.html", "coords": [52.3676, 4.9041]}], "latlngs": [[48.8566, 2.3522], [36.7213, -4.4213], [35.7673, -5.7998], [35.1688, -5.2692], [36.7213, -4.4213], [52.3676, 4.9041]]}, {"name": "Route 7 \u2013 \ud83c\udff0 Languedoc & Provence", "color": "#26a69a", "cities": [{"name": "Paris", "country": "France", "nights": 0, "hotel": "", "cost": 0, "highlights": "Departure city \u2014 TGV south to Carcassonne (4.5h).", "booking_url": "", "coords": [48.8566, 2.3522]}, {"name": "Carcassonne", "country": "France", "nights": 2, "hotel": "H\u00f4tel de la Cit\u00e9", "cost": 280, "highlights": "The best medieval castle in Europe \u2014 a fully intact walled city on a hilltop, UNESCO World Heritage. Kids are speechless.\nLa Cit\u00e9: 52 towers, double ramparts, drawbridge, moat \u2014 the real deal. Walk the walls at sunset.\nCh\u00e2teau Comtal inside the city. Narbonne day trip (Roman museum + beach 15 min away). Canal du Midi boat ride. Evening in the lower town \u2014 duck confit is the local dish.", "booking_url": "https://www.booking.com/hotel/fr/de-la-cite-carcassonne.html", "coords": [43.2074, 2.3641]}, {"name": "N\u00eemes", "country": "France", "nights": 1, "hotel": "H\u00f4tel Vatel N\u00eemes", "cost": 160, "highlights": "Pont du Gard \u2014 a 2,000-year-old Roman aqueduct so well-preserved it looks fake. Walk across the top tier (kids love it). Swim in the river Gardon below it on hot days.\nN\u00eemes Roman Amphitheatre \u2014 the best-preserved Roman arena in the world, better than the Colosseum in Rome (and half the crowds). Still hosts bullfights and concerts.\nMaison Carr\u00e9e \u2014 Roman temple from 16 BC, perfectly intact. Les Ar\u00e8nes area for dinner.", "booking_url": "https://www.booking.com/hotel/fr/vatel-nimes.html", "coords": [43.8367, 4.3601]}, {"name": "Cassis", "country": "France", "nights": 2, "hotel": "Les Roches Blanches", "cost": 240, "highlights": "Calanques National Park \u2014 dramatic limestone cliffs dropping into turquoise water, only accessible by boat or hiking. Rent a boat for the day (\u20ac60\u2013100) or take a calanque cruise. The most beautiful coastline in France.\nCassis fishing village: morning market, bouillabaisse, ros\u00e9 on the port. Very family-friendly.\nMarseille day trip (25 min by car): Ch\u00e2teau d'If \u2014 the real island fortress from The Count of Monte Cristo. Kids who've read the book will lose their minds. MuCEM (Museum of European Civilizations) if culture mood. Vieux-Port for lunch.", "booking_url": "https://www.booking.com/hotel/fr/les-roches-blanches-cassis.html", "coords": [43.214, 5.5378]}, {"name": "Amsterdam", "country": "Netherlands", "nights": 0, "hotel": "The Hoxton Amsterdam", "cost": 0, "highlights": "Fly home from Marseille (easyJet/Transavia direct, ~2h). Marseille airport is 30 min from Cassis by taxi.", "booking_url": "https://www.booking.com/hotel/nl/the-hoxton-amsterdam.html", "coords": [52.3676, 4.9041]}], "latlngs": [[48.8566, 2.3522], [43.2074, 2.3641], [43.8367, 4.3601], [43.214, 5.5378], [43.2965, 5.3698], [52.3676, 4.9041]]}];

const map = L.map('map').setView([44.0, 1.5], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

let activeRouteIdx = 0;
const layers = [];
const markerGroups = [];

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;border-radius:50%;
      background:${color};border:2.5px solid white;
      box-shadow:0 0 6px rgba(0,0,0,0.5);">
    </div>`,
    iconSize: [14, 14], iconAnchor: [7, 7]
  });
}

function makeStartIcon() {
  return L.divIcon({
    className: '',
    html: `<div style="font-size:22px;line-height:1;">🗼</div>`,
    iconSize: [26, 26], iconAnchor: [13, 13]
  });
}

function makeEndIcon() {
  return L.divIcon({
    className: '',
    html: `<div style="font-size:22px;line-height:1;">🌷</div>`,
    iconSize: [26, 26], iconAnchor: [13, 13]
  });
}

ROUTES.forEach((route, idx) => {
  const dash = idx === 0 ? null : (idx === 1 ? '10,6' : (idx === 2 ? '4,8' : '8,4,2,4'));
  const line = L.polyline(route.latlngs, {
    color: route.color, weight: 4, opacity: 0.9, dashArray: dash
  }).addTo(map);
  line._origDash = dash;
  // Wide invisible hit area so tapping/clicking the route is easy on mobile
  const hitLine = L.polyline(route.latlngs, {
    color: 'transparent', weight: 24, opacity: 0, interactive: true
  }).addTo(map);
  hitLine.on('click', () => setActiveRoute(idx));
  line.on('click',    () => setActiveRoute(idx));

  const group = L.layerGroup();
  route.cities.forEach((city, ci) => {
    let icon;
    if (city.name === 'Paris')     icon = makeStartIcon();
    else if (city.name === 'Amsterdam') icon = makeEndIcon();
    else icon = makeIcon(route.color);

    const marker = L.marker(city.coords, { icon })
      .bindTooltip(`<b>${city.name}</b><br>${route.name.split('–')[1].trim()}`, {
        permanent: false, direction: 'top', offset: [0, -10]
      })
      .on('click', () => showCityDetail(city, route.color, route.name));

    group.addLayer(marker);
  });

  layers.push({ line, group });
  markerGroups.push(group);
});

function setActiveRoute(idx) {
  activeRouteIdx = idx;

  layers.forEach((l, i) => {
    if (i === idx) {
      l.line.setStyle({ opacity: 1, weight: 6, dashArray: null });
      l.group.eachLayer(m => { const el = m.getElement(); if (el) el.style.opacity = '1'; });
      l.group.addTo(map);
    } else {
      l.line.setStyle({ opacity: 0.55, weight: 3, dashArray: l.line._origDash });
      l.group.eachLayer(m => { const el = m.getElement(); if (el) el.style.opacity = '0.45'; });
      l.group.addTo(map);
    }
  });

  // Update toggles
  document.querySelectorAll('.route-toggle').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    if (i === idx) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });

  // Fit bounds
  map.fitBounds(layers[idx].line.getBounds(), { padding: [40, 40] });

  // Update city list
  renderCityList(idx);
  document.getElementById('city-detail').style.display = 'none';
}

function renderCityList(idx) {
  const route = ROUTES[idx];
  const el = document.getElementById('city-list');
  el.innerHTML = route.cities.map(city => `
    <div class="city-card" onclick='showCityDetail(${JSON.stringify(city)}, "${route.color}", "${route.name}")'>
      <div class="city-name">${city.name}, ${city.country}</div>
      <div class="city-hotel">${city.hotel !== '—' ? city.hotel : 'Last day / departure'}</div>
      ${city.cost > 0 ? `<div class="city-cost">~$${city.cost}/night</div>` : ''}
    </div>
  `).join('');
}

function showCityDetail(city, color, routeName) {
  const el = document.getElementById('city-detail');
  const gmapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(city.name + ' ' + city.country)}`;
  const t = (TRANSPORT_COSTS[routeName] || {})[city.name];
  el.style.display = 'block';
  el.innerHTML = `
    <h3 style="color:${color}">${city.name} <span style="color:#aaa;font-weight:400;font-size:0.85rem">${city.country}</span></h3>
    ${city.hotel !== '—' ? `
      <div class="label">Hotel</div>
      <div class="val">${city.hotel}</div>
      <div class="label">Lodging / night</div>
      <div class="val" style="color:#7ec8e3">~$${city.cost}</div>
    ` : ''}
    ${t && t.cost > 0 ? `
      <div class="label">🚆 Getting Here</div>
      <div class="val" style="color:#f39c12">~$${t.cost} / person</div>
      <div class="val" style="font-size:0.78rem;color:#aaa;margin-top:2px;line-height:1.4">${t.note}</div>
    ` : ''}
    <div class="label">Must-See</div>
    <div class="val">${city.highlights}</div>
    <div style="margin-top:12px">
      ${city.booking_url ? `<a href="${city.booking_url}" target="_blank">🏨 Book Hotel</a>` : ''}
      <a href="${gmapsUrl}" target="_blank" class="gmaps-btn">📍 Google Maps</a>
    </div>
  `;
  // Pan map to city
  if (city.coords) map.panTo(city.coords, { animate: true });
}

// Build toggles
const togglesEl = document.getElementById('route-toggles');
ROUTES.forEach((route, idx) => {
  // Lodging totals account for multi-night stays (cities deduplicated for map, not for cost)
  const LODGING_TOTALS = {
    "Route 1 \u2013 \ud83c\udfd4\ufe0f Alpine Arc":      2200,  // Paris×2 + Interlaken×3 + Lucerne×1 + Cologne×2 + Amsterdam×1
    "Route 2 \u2013 \ud83c\udff0 Rhine Valley":     2025,  // Paris×2 + Strasbourg×2 + Heidelberg×1 + Bacharach×1 + Cologne×2 + Amsterdam×1
        "Route 3 – ⛰️ Alps & Prague": 1110,  // Interlaken×2=440 + Prague×2=390 + Amsterdam×1=280
    "Route 4 – 🌍 Iberian Arc & Morocco": 1335,  // Barcelona×2=500 + Granada×1=220 + Tangier×1=125 + Chefchaouen×1=210 + Amsterdam×1=280
    "Route 5 – 🌊 Interlaken & Riviera": 1160,  // Interlaken×2=440 + Nice×2=560 + Menton×1=160
    "Route 6 – 🌶️ Spain & Morocco Loop": 715,   // Málaga×2=380 + Tangier×1=125 + Chefchaouen×1=210
    "Route 7 – 🏰 Languedoc & Provence": 1200,  // Carcassonne×2=560 + Nîmes×1=160 + Cassis×2=480
  };

  const TRANSIT_STATS = {
    "Route 1 – 🏔️ Alpine Arc":           { avgNights: 1.8, trainH: 15.5, busH: 0,  ferryH: 0, flightH: 0,  totalH: 15.5 },
    "Route 2 – 🏰 Rhine Valley":          { avgNights: 1.5, trainH: 9.5,  busH: 0,  ferryH: 0, flightH: 0,  totalH: 9.5  },
    "Route 3 – ⛰️ Alps & Prague":       { avgNights: 1.7, trainH: 23.5, busH: 0,  ferryH: 0, flightH: 0,  totalH: 23.5 },
    "Route 4 – 🌍 Iberian Arc & Morocco": { avgNights: 1.2, trainH: 12.5, busH: 11, ferryH: 1, flightH: 3,  totalH: 27.5 },
    "Route 5 – 🌊 Interlaken & Riviera": { avgNights: 1.7, trainH: 13.5, busH: 0,  ferryH: 0, flightH: 2,  totalH: 15.5 },
    "Route 6 – 🌶️ Spain & Morocco Loop": { avgNights: 1.3, trainH: 0,    busH: 8,  ferryH: 1, flightH: 5.5,totalH: 14.5 },
    "Route 7 – 🏰 Languedoc & Provence": { avgNights: 1.7, trainH: 7,    busH: 0,  ferryH: 0, flightH: 2,  totalH: 9   },
  };
  const lodging   = LODGING_TOTALS[route.name] || route.cities.reduce((s, c) => s + c.cost, 0);
  const transport = Object.values(TRANSPORT_COSTS[route.name] || {}).reduce((s, t) => s + (t.cost||0), 0);
  const totalPP   = lodging + transport;
  const div = document.createElement('div');
  div.className = 'route-toggle';
  div.style.background = route.color + '22';
  div.innerHTML = `
    <div class="dot" style="background:${route.color}"></div>
    <div>
      <div class="name">${route.name}</div>
      <div class="sub">${route.cities.map(c=>c.name).join(' → ')}</div>
      <div class="cost" style="font-size:0.9rem;font-weight:700;color:white">~$${(totalPP*4).toLocaleString()} total (family of 4)</div>
      <div class="cost" style="font-size:0.72rem;color:#aaa">$${totalPP.toLocaleString()}/person · lodging $${lodging.toLocaleString()} + transport $${transport.toLocaleString()}</div>
      <div class="cost" style="font-size:0.72rem;color:#9db;margin-top:2px">${(() => {
        const s = TRANSIT_STATS[route.name] || {};
        const parts = [];
        if (s.trainH)  parts.push('🚂 ' + s.trainH + 'h train');
        if (s.busH)    parts.push('🚌 ' + s.busH  + 'h bus');
        if (s.ferryH)  parts.push('⛴️ ' + s.ferryH + 'h ferry');
        if (s.flightH) parts.push('✈️ ' + s.flightH + 'h flight');
        return 'Avg stay ' + (s.avgNights||'?') + 'n/city · ' + parts.join(' · ') + ' · ⏱ ' + (s.totalH||'?') + 'h transit total';
      })()}</div>
    </div>
  `;
  div.addEventListener('click', () => setActiveRoute(idx));
  togglesEl.appendChild(div);
});

// Build legend
const legendEl = document.getElementById('legend');
legendEl.innerHTML = ROUTES.map((r, i) => `
  <div class="legend-item">
    <div class="legend-line" style="background:${r.color};${i===1?'background:repeating-linear-gradient(90deg,'+r.color+' 0,'+r.color+' 6px,transparent 6px,transparent 10px)':i===2?'background:repeating-linear-gradient(90deg,'+r.color+' 0,'+r.color+' 4px,transparent 4px,transparent 8px)':''}"></div>
    <span>${r.name.split('–')[1]?.trim()}</span>
  </div>
`).join('');

// Initialize — fit ALL routes in view so Morocco route is visible from the start
layers.forEach(l => { l.line.addTo(map); l.group.addTo(map); });
const allBounds = layers.reduce((b, l) => b.extend(l.line.getBounds()), L.latLngBounds());
map.fitBounds(allBounds, { padding: [30, 30] });
setActiveRoute(0);
</script>
